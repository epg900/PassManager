{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Password Data</title>
    <link href="{% static 'bootstrap.min.css' %}" rel="stylesheet" />
</head>
<body>
    <div class="container mt-5">
        <h2>Edit Password Data</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save</button>
			<button class="btn btn-success" onclick="window.open('/','_self');" >Cancel</button>
        </form>
    </div>
</body>
</html>
